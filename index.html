<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Right Back | Things Done Immediately</title>
    <meta name="robots" content="noindex, nofollow">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000814;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated Gradient Background */
        .gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(15, 98, 254, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(138, 63, 252, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(36, 161, 72, 0.1) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }
        
        @keyframes gradientShift {
            0%, 100% { 
                background-position: 0% 50%, 100% 50%, 50% 100%; 
            }
            50% { 
                background-position: 100% 50%, 0% 50%, 50% 0%; 
            }
        }
        
        /* Floating Particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background: rgba(69, 137, 255, 0.3);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100px) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Main Content */
        .container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            z-index: 10;
        }
        
        /* Logo */
        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 40px;
            display: inline-block;
        }
        
        .logo-gradient {
            background: linear-gradient(135deg, #0f62fe, #8a3ffc, #24a148);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 3s ease infinite;
        }
        
        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* Animated Icon */
        .icon-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            position: relative;
        }
        
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(15, 98, 254, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-out infinite;
        }
        
        .pulse-ring:nth-child(2) { animation-delay: 0.5s; }
        .pulse-ring:nth-child(3) { animation-delay: 1s; }
        
        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        
        .main-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            background: linear-gradient(135deg, #0f62fe, #8a3ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Headings */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff, #a56eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        /* Email CTA */
        .email-cta {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            margin: 30px 0;
            transition: all 0.3s ease;
        }
        
        .email-cta:hover {
            border-color: #0f62fe;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(15, 98, 254, 0.2);
        }
        
        .email-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .email-address {
            font-size: 1.3rem;
            font-weight: 600;
            color: #4589ff;
            text-decoration: none;
            display: inline-block;
            padding: 10px 20px;
            background: rgba(69, 137, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .email-address:hover {
            background: rgba(69, 137, 255, 0.2);
            color: #7bb2ff;
        }
        
        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
        }
        
        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background: #0f62fe;
            color: white;
            transform: translateY(-3px);
            border-color: #0f62fe;
        }
        
        /* Footer Note */
        .footer-note {
            margin-top: 40px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .logo { font-size: 2.2rem; }
            .container { padding: 20px; }
        }
    </style>
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="gradient-bg"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Main Content -->
    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <span class="logo-gradient">Things Done Immediately</span>
        </div>
        
        <!-- Animated Icon -->
        <div class="icon-container">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="main-icon">
                <i class="fas fa-bolt"></i>
            </div>
        </div>
        
        <!-- Heading -->
        <h1>Leveling Up</h1>
        
        <!-- Subtitle -->
        <p class="subtitle">
            We're cooking something special behind the scenes. 
            <br>Better, faster, stronger — coming right up.
        </p>
        
        <!-- Email CTA -->
        <div class="email-cta">
            <div class="email-label">Need something urgently?</div>
            <a href="mailto:goodenough245@gmail.com" class="email-address">
                goodenough245@gmail.com
            </a>
            <div style="margin-top: 10px; font-size: 0.9rem; color: rgba(255,255,255,0.5);">
                <i class="fas fa-reply"></i> We respond within hours
            </div>
        </div>
        
        <!-- Social Links -->
        <div class="social-links">
            <a href="https://wa.me/27763621131" class="social-link" target="_blank" title="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="mailto:goodenough245@gmail.com" class="social-link" title="Email">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="https://www.instagram.com/not_thegamer_in/" class="social-link" target="_blank" title="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
        
        <!-- Footer Note -->
        <div class="footer-note">
            Back in a flash ⚡
        </div>
    </div>
    
    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 15;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // Random properties
            const size = Math.random() * 20 + 5;
            const startX = Math.random() * 100;
            const duration = Math.random() * 10 + 10;
            const delay = Math.random() * 5;
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${startX}%`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `${delay}s`;
            
            // Random color
            const colors = [
                'rgba(15, 98, 254, 0.3)',    // Blue
                'rgba(138, 63, 252, 0.3)',   // Purple
                'rgba(36, 161, 72, 0.3)',    // Green
                'rgba(69, 137, 255, 0.3)'    // Light Blue
            ];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            particlesContainer.appendChild(particle);
        }
        
        // Add subtle mouse move effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 20 - 10;
            const y = (e.clientY / window.innerHeight) * 20 - 10;
            
            document.querySelector('.container').style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
