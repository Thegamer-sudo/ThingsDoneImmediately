<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Things Done Immediately — Rebuilding</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: #ffffff;
  color: #111;
  height: 100vh;
  overflow: hidden;
}

/* Center content */
.center {
  position: absolute;
  z-index: 10;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding: 50px 70px;
  border-radius: 24px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.08);
  animation: fadeIn 1.5s ease;
}

h1 {
  font-size: 3rem;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

p {
  font-size: 1.2rem;
  color: #555;
  line-height: 1.6;
}

/* Arena */
.arena {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* Robot fighters */
.robot {
  position: absolute;
  width: 40px;
  height: 60px;
  background: #111;
  border-radius: 10px;
}

.robot::before {
  content: "";
  position: absolute;
  top: -15px;
  left: 5px;
  width: 30px;
  height: 30px;
  background: #111;
  border-radius: 50%;
}

.sword {
  position: absolute;
  width: 6px;
  height: 60px;
  background: linear-gradient(to bottom, #999, #000);
  top: 20px;
  right: -5px;
  transform-origin: top;
  animation: swing 0.6s infinite alternate;
}

@keyframes swing {
  from { transform: rotate(20deg); }
  to { transform: rotate(-40deg); }
}

/* Robot movement */
@keyframes fight {
  0% { transform: translateX(0) translateY(0); }
  25% { transform: translateX(40px) translateY(-20px); }
  50% { transform: translateX(-40px) translateY(10px); }
  75% { transform: translateX(30px) translateY(-10px); }
  100% { transform: translateX(0) translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, -45%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}
</style>
</head>
<body>

<div class="arena" id="arena"></div>

<div class="center">
  <h1>Things Done Immediately</h1>
  <p>
    We’re rebuilding something powerful.<br>
    Systems. Automation. Execution.<br><br>
    Enjoy the chaos while we sharpen the blades.
  </p>
</div>

<script>
const arena = document.getElementById("arena");

function createRobot() {
  const robot = document.createElement("div");
  robot.className = "robot";

  const sword = document.createElement("div");
  sword.className = "sword";
  robot.appendChild(sword);

  robot.style.top = Math.random() * window.innerHeight + "px";
  robot.style.left = Math.random() * window.innerWidth + "px";
  robot.style.animation = "fight " + (2 + Math.random() * 3) + "s infinite ease-in-out";

  arena.appendChild(robot);
}

for (let i = 0; i < 20; i++) {
  createRobot();
}
</script>

</body>
</html>
