<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Things Done Immediately — Relaunching</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    }

    body {
      background: #ffffff;
      color: #111;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 700px;
      padding: 40px;
      animation: fadeIn 1.5s ease-out;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .timer {
      display: flex;
      justify-content: center;
      gap: 30px;
      font-size: 2rem;
      font-weight: 700;
    }

    .time-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #888;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,0,0,0.05) 0%, transparent 60%);
      filter: blur(80px);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0% { transform: translate(-50px, -50px); }
      50% { transform: translate(50px, 50px); }
      100% { transform: translate(-50px, -50px); }
    }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="container">
    <h1>Things Done Immediately</h1>
    <p>
      We are rebuilding something powerful.<br>
      A new system for speed, growth, and digital dominance is coming.
    </p>

    <div class="timer">
      <div class="time-box">
        <div id="hours">24</div>
        <div class="label">Hours</div>
      </div>
      <div class="time-box">
        <div id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>
      <div class="time-box">
        <div id="seconds">00</div>
        <div class="label">Seconds</div>
      </div>
    </div>
  </div>

  <script>
    const countdownTime = 24 * 60 * 60; // 24 hours in seconds
    let timeLeft = countdownTime;

    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function updateTimer() {
      const hours = Math.floor(timeLeft / 3600);
      const minutes = Math.floor((timeLeft % 3600) / 60);
      const seconds = timeLeft % 60;

      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");

      if (timeLeft > 0) timeLeft--;
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>

</body>
</html>
